<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Responsive Website</title>

    <link rel="stylesheet" href="sty.css">

</head>

<body>

    <header>
        <h1>Student Website</h1>
    </header>

    <nav>
        <a href="#">Home</a>
        <a href="#">About</a>
        <a href="#">Contact</a>
    </nav>

    <section class="box">

        <h2>Student Form</h2>

        <form>

            <input type="text" placeholder="Enter Name">

            <input type="email" placeholder="Enter Email">

            <input type="text" placeholder="Enter Course">

            <button type="submit">Submit</button>

        </form>

    </section>

    <section class="box">

        <h2>Student Table</h2>

        <table>

            <tr>
                <th>Name</th>
                <th>Course</th>
                <th>Marks</th>
            </tr>

            <tr>
                <td>Ali</td>
                <td>CSE</td>
                <td>85</td>
            </tr>

            <tr>
                <td>Ahmad</td>
                <td>IT</td>
                <td>90</td>
            </tr>

            <tr>
                <td>Zaid</td>
                <td>ECE</td>
                <td>80</td>
            </tr>

        </table>

    </section>

</body>

</html>
